# Dotrino IA — agente aislado en Docker (opcional).
# Generado por `dotrino-ia-agent init-docker`. Guía:
#   https://github.com/imdotrino/dotrino-ia/tree/main/container
#
# El enrolamiento (interactivo, con navegador) se hace AFUERA, y al contenedor le
# entra el link.json ya enrolado por el volumen ./data:
#   npx @dotrino/ia-agent enroll --enroll-only --dir ./data   # 1) enrola afuera
#   docker compose up -d                                      # 2) el contenedor SOLO corre
services:
  ia-agent:
    build: .
    # Alternativa sin build local: usa una imagen ya construida.
    # image: dotrino-ia-agent
    env_file: .env            # tu token de Claude (ver .env.example)
    volumes:
      - ./data:/data          # enlace al vault (persiste el enrolamiento)
      # Monta AQUÍ el proyecto que quieres que la IA pueda tocar (y solo ese):
      - ./workspace:/workspace
    restart: unless-stopped
    # Sin puertos: el agente sale hacia el proxy del ecosistema, no escucha nada.
